<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جامعة تكريت - نظام الواجبات</title>
    
    <!-- استيراد المكتبات -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- MathJax لإظهار المعادلات الرياضية -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; }
        .assignment-card { background: white; border-radius: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); }
        .no-select { user-select: none; }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
        .math-display { font-size: 1.6rem; margin: 2rem 0; color: #1e3a8a; text-align: center; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ضعي رابط Web App URL الخاص بكِ هنا من الـ Canvas Script ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw97nfKM1mPTfTUDNMrlI1Uvsfx82U33f7eESInXFks83QzMzeT2xguBRELwe3kUAN_0w/exec";

        function App() {
            const [step, setStep] = useState('register');
            const [studentInfo, setStudentInfo] = useState({ name: '', studyType: 'صباحي A' });
            const [ans, setAns] = useState({});
            const [pdfBase64, setPdfBase64] = useState(null);
            const [loading, setLoading] = useState(false);
            const [isReturning, setIsReturning] = useState(false);

            // استعادة البيانات السابقة إذا كان الطالب قد حل مسبقاً من نفس الجهاز
            useEffect(() => {
                const saved = localStorage.getItem('tikrit_hw3_cache_v3');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    setStudentInfo(parsed.studentInfo);
                    setAns(parsed.ans);
                    setIsReturning(true);
                }
            }, []);

            // تحديث MathJax لرسم المعادلات عند تغيير الخطوات
            useEffect(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise();
                }
            }, [step, studentInfo.name]);

            // عشوائية ذكية بناءً على "بصمة الاسم" لضمان ثبات الأسئلة لنفس الطالب
            const assignment = useMemo(() => {
                if (!studentInfo.name || studentInfo.name.trim().length < 5) return null;
                
                // دالة لتبسيط الاسم وتوليد Seed (مطابقة للمنطق في Canvas)
                const fingerprint = studentInfo.name.replace(/[^ا-ي]/g, "").replace(/[أإآ]/g, "ا").replace(/ة/g, "ه").replace(/ى/g, "ي");
                const seed = fingerprint.split("").reduce((acc, char) => acc + char.charCodeAt(0), 0);
                
                const getRnd = (min, max, offset) => {
                    const r = (Math.abs(Math.sin(seed + offset)) * 10000) % 1;
                    return (min + r * (max - min));
                };

                return {
                    q1: { a: Math.floor(getRnd(1, 3, 5)), b: Math.floor(getRnd(5, 8, 15)) },
                    q2: { h: Math.floor(getRnd(1, 3, 25)) + 1, y: [0,1,2,3,4,5,6,7,8].map((_, i) => parseFloat(getRnd(5, 25, i + 50).toFixed(2))) },
                    q3: { a: Math.floor(getRnd(1, 4, 35)), b: Math.floor(getRnd(6, 10, 45)) }
                };
            }, [studentInfo.name]);

            // محرك التصحيح السري (الدرجة لا تظهر للطالب)
            const calculateResults = () => {
                const f = (x) => Math.sqrt(x + 1);
                const { a, b } = assignment.q1;
                const h1 = (b-a)/4, y1 = [0,1,2,3,4].map(i => f(a + i*h1));
                const trap = (h1/2) * (y1[0] + y1[4] + 2*(y1[1]+y1[2]+y1[3]));
                const simp = (h1/3) * (y1[0] + y1[4] + 4*(y1[1]+y1[3]) + 2*y1[2]);
                const t3 = [0, -0.77459, 0.77459], w3 = [0.88888, 0.55555, 0.55555];
                let g3 = 0; for(let i=0; i<3; i++) g3 += w3[i] * f(((b-a)/2)*t3[i] + ((b+a)/2)); g3 *= (b-a)/2;
                
                const y2 = assignment.q2.y, h2 = assignment.q2.h;
                let area = y2[0] + y2[8]; for(let i=1; i<8; i++) area += (i % 2 === 1 ? 4 : 2) * y2[i]; area *= (h2/3);
                
                const f3 = (x) => Math.sqrt(1+x), a3 = assignment.q3.a, b3 = assignment.q3.b;
                const t4 = [0.33998, -0.33998, 0.86113, -0.86113], w4 = [0.65214, 0.65214, 0.34785, 0.34785];
                let g4 = 0; for(let i=0; i<4; i++) g4 += w4[i] * f3(((b3-a3)/2)*t4[i] + ((b3+a3)/2)); g4 *= (b3-a3)/2;

                let score = 0;
                const check = (v, t, full) => (Math.abs(parseFloat(v||0) - parseFloat(t)) < 0.055 ? full : (Math.floor(parseFloat(v||0)) === Math.floor(parseFloat(t)) ? 1.0 : 0.5));
                
                score += check(ans.q1t, trap, 1.5);
                score += check(ans.q1s, simp, 1.5);
                score += check(ans.q1g, g3, 1.5);
                
                const v2 = parseFloat(ans.q2||0);
                if (Math.abs(v2 - area) < 0.06) score += 2.5;
                else if (Math.floor(v2) === Math.floor(area)) score += 2.0;
                else if (Math.abs(v2 - area) < 0.6) score += 1.5;
                else score += 1.0;

                const v3 = parseFloat(ans.q3||0);
                if (v3.toFixed(2) === g4.toFixed(2)) score += 3.0;
                else if (Math.floor(v3) === Math.floor(g4)) score += 2.5;
                else if (Math.abs(v3 - g4) < 0.2) score += 2.0;
                else score += 1.0;

                return { 
                    grade: Math.min(score, 10).toFixed(2), 
                    model: { q1: `T:${trap.toFixed(2)}, S:${simp.toFixed(2)}, G:${g3.toFixed(2)}`, q2: area.toFixed(2), q3: g4.toFixed(2) } 
                };
            };

            const submitAssignment = async () => {
                if(!pdfBase64) return alert("يرجى رفع ملف الحل اليدوي PDF أولاً");
                setLoading(true);
                const results = calculateResults();

                const payload = {
                    name: studentInfo.name,
                    studyType: studentInfo.studyType,
                    grade: results.grade,
                    studentAnswers: ans,
                    modelAnswers: results.model,
                    pdfBase64: pdfBase64,
                    timestamp: new Date().toLocaleString('ar-IQ')
                };

                try {
                    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    localStorage.setItem('tikrit_hw3_cache_v3', JSON.stringify({ studentInfo, ans }));
                    setStep('success');
                } catch (e) { alert("حدث خطأ في الاتصال"); } finally { setLoading(false); }
            };

            return (
                <div className="min-h-screen py-10 px-4 flex flex-col items-center">
                    <div className="w-full max-w-2xl assignment-card overflow-hidden border-t-[16px] border-blue-900 no-select">
                        
                        {/* Header القسم العلوي */}
                        <div className="p-6 bg-slate-50 border-b flex justify-between items-center">
                            <div className="text-right">
                                <h1 className="text-xl font-black text-blue-900 leading-tight">Civil Engineering Department</h1>
                                <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Tikrit University - Numerical Analysis</p>
                            </div>
                            <div className="bg-blue-900 text-white px-3 py-1 rounded-xl font-black text-xs uppercase italic">HW3 Portal</div>
                        </div>

                        {step === 'register' && (
                            <div className="p-10 text-right">
                                {isReturning && <div className="bg-blue-50 text-blue-700 p-4 rounded-3xl mb-8 text-xs font-bold border border-blue-100 flex items-center gap-2">أهلاً بك مجدداً، يمكنك مراجعة وتعديل حلك السابق.</div>}
                                <h2 className="text-xl font-black mb-8 border-r-8 border-blue-600 pr-3 text-slate-800">بيانات الطالب</h2>
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 mb-2 mr-1">الاسم الثلاثي (باللغة العربية):</label>
                                        <input type="text" placeholder="اكتب اسمك كما في القائمة..." className="w-full p-4 border-2 rounded-3xl mb-4 outline-none focus:border-blue-900 shadow-sm" onChange={e => setStudentInfo({...studentInfo, name: e.target.value})} value={studentInfo.name} />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 mb-2 mr-1">نوع الدراسة:</label>
                                        <select className="w-full p-4 border-2 rounded-3xl mb-10 bg-white font-bold outline-none" onChange={e => setStudentInfo({...studentInfo, studyType: e.target.value})} value={studentInfo.studyType}>
                                            <option>صباحي A</option><option>صباحي B</option><option>صباحي C</option><option>فصلي</option><option>مسائي</option>
                                        </select>
                                    </div>
                                </div>
                                <button onClick={() => studentInfo.name.trim().split(/\s+/).length >= 3 ? setStep('q1') : alert("يرجى إدخال اسمك الثلاثي كاملاً")} className="w-full bg-blue-900 text-white font-black py-5 rounded-3xl shadow-xl hover:bg-blue-800 transition-all text-xl">دخول للواجب</button>
                            </div>
                        )}

                        {step === 'q1' && (assignment) && (
                            <div className="p-8 text-left" dir="ltr">
                                <button onClick={() => setStep('register')} className="text-blue-600 text-xs font-bold mb-6 flex items-center gap-1 hover:underline">← Edit Student Info</button>
                                <p className="font-bold text-slate-800 mb-2">Q1: Evaluate</p>
                                <div className="math-display">
                                    {"\\[ \\int_{" + assignment.q1.a + "}^{" + assignment.q1.b + "} \\sqrt{x+1} \\, dx \\]"}
                                </div>
                                <p className="font-bold mb-8 text-sm text-slate-600">using: a.) Trapezoidal Method (n=4), b.) Simpson's Rule (n=4) and c.) Gauss-Quadrature (n=3)</p>
                                <div className="space-y-4" dir="rtl">
                                    <input type="number" step="any" placeholder="a.) Trapezoidal Result" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-500" onChange={e => setAns({...ans, q1t: e.target.value})} value={ans.q1t || ''} />
                                    <input type="number" step="any" placeholder="b.) Simpson's Result" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-500" onChange={e => setAns({...ans, q1s: e.target.value})} value={ans.q1s || ''} />
                                    <input type="number" step="any" placeholder="c.) Gauss-Quadrature Result" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-500" onChange={e => setAns({...ans, q1g: e.target.value})} value={ans.q1g || ''} />
                                </div>
                                <button onClick={() => (ans.q1t && ans.q1s && ans.q1g) ? setStep('q2') : alert("Please fill all answers")} className="w-full mt-10 bg-blue-900 text-white py-4 rounded-3xl font-black shadow-lg">Next Question</button>
                            </div>
                        )}

                        {step === 'q2' && (assignment) && (
                            <div className="p-8 text-left" dir="ltr">
                                <p className="font-bold text-slate-800 mb-4 tracking-tighter">Q2: Find the area enclosed by the following points using: Simpson's Rule</p>
                                <div className="overflow-x-auto mb-8 rounded-2xl border shadow-inner bg-slate-50">
                                    <table className="w-full text-center text-[10px] font-mono">
                                        <tr className="bg-blue-900 text-white font-bold"><td className="p-2 border-b border-blue-800">X</td>{[0,1,2,3,4,5,6,7,8].map(i => <td key={i} className="border-b border-blue-800">{i * assignment.q2.h}</td>)}</tr>
                                        <tr><td className="p-2 font-bold bg-white border-b">$f(x)$</td>{assignment.q2.y.map((v, i) => <td key={i} className="border-b">{v}</td>)}</tr>
                                    </table>
                                </div>
                                <div dir="rtl">
                                    <input type="number" step="any" placeholder="Area Result" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-500" onChange={e => setAns({...ans, q2: e.target.value})} value={ans.q2 || ''} />
                                </div>
                                <div className="flex gap-4 mt-12">
                                    <button onClick={() => setStep('q1')} className="flex-1 bg-slate-100 py-4 rounded-3xl font-bold text-slate-500">Back</button>
                                    <button onClick={() => ans.q2 ? setStep('q3') : alert("Please fill the answer")} className="flex-[2] bg-blue-900 text-white py-4 rounded-3xl font-black shadow-lg">Next</button>
                                </div>
                            </div>
                        )}

                        {step === 'q3' && (assignment) && (
                            <div className="p-8 text-left" dir="ltr">
                                <p className="font-bold text-slate-800 mb-2 tracking-tighter">Q3: Evaluate</p>
                                <div className="math-display">
                                    {"\\[ \\int_{" + assignment.q3.a + "}^{" + assignment.q3.b + "} \\sqrt{1+x} \\, dx \\]"}
                                </div>
                                <p className="font-bold mb-10 text-sm text-slate-600 italic">using Gauss-Quadrature formula (n=4).</p>
                                <div dir="rtl">
                                    <input type="number" step="any" placeholder="Final Result" className="w-full p-4 border-2 rounded-2xl text-center font-mono focus:border-blue-500" onChange={e => setAns({...ans, q3: e.target.value})} value={ans.q3 || ''} />
                                </div>
                                <div className="flex gap-4 mt-12">
                                    <button onClick={() => setStep('q2')} className="flex-1 bg-slate-100 py-4 rounded-3xl font-bold text-slate-500">Back</button>
                                    <button onClick={() => ans.q3 ? setStep('submit') : alert("Please fill the answer")} className="flex-[2] bg-blue-900 text-white py-4 rounded-3xl font-black shadow-lg">Next to Upload</button>
                                </div>
                            </div>
                        )}

                        {step === 'submit' && (
                            <div className="p-10 text-center">
                                <h3 className="text-xl font-black mb-10 text-blue-900 underline underline-offset-8 decoration-blue-100">مرحلة الرفع: ارفق ملف الحل PDF</h3>
                                <div className="border-4 border-dashed p-14 rounded-[3.5rem] bg-slate-50 mb-10 border-blue-50 flex flex-col items-center group hover:border-blue-300 transition-colors cursor-pointer">
                                    <input type="file" accept="application/pdf" id="pdf" className="hidden" onChange={e => {
                                        const file = e.target.files[0];
                                        const reader = new FileReader();
                                        reader.onload = () => setPdfBase64(reader.result.split(',')[1]);
                                        reader.readAsDataURL(file);
                                    }} />
                                    <label htmlFor="pdf" className="cursor-pointer">
                                        <div className="text-7xl mb-4 group-hover:scale-110 transition-transform">📄</div>
                                        <p className="font-black text-slate-600 mb-2">{pdfBase64 ? "✅ تم اختيار الملف" : "اضغط لاختيار ملف PDF"}</p>
                                        <p className="text-[10px] text-slate-400 font-bold italic italic">يجب رفع حل الأسئلة يدوياً (إلزامي)</p>
                                    </label>
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={() => setStep('q3')} className="flex-1 bg-slate-100 py-5 rounded-3xl font-bold text-slate-400">رجوع</button>
                                    <button onClick={submitAssignment} disabled={loading || !pdfBase64} className="flex-[2] bg-green-600 text-white py-5 rounded-3xl font-black text-2xl shadow-xl disabled:opacity-30">
                                        {loading ? "جاري الإرسال..." : "تأكيد التسليم النهائي"}
                                    </button>
                                </div>
                                {!pdfBase64 && <p className="text-[10px] text-red-500 font-bold mt-4 tracking-tighter">* لا يمكن التسليم بدون إرفاق ملف PDF</p>}
                            </div>
                        )}

                        {step === 'success' && (
                            <div className="p-20 text-center bg-white shadow-inner">
                                <div className="text-8xl mb-8">🎓</div>
                                <h2 className="text-2xl font-black mb-10 text-blue-900 leading-loose">
                                    لقد تم استلام اجابتك بنجح يا <br/>
                                    <span className="text-blue-700 underline underline-offset-8 decoration-2">{studentInfo.name}</span> <br/>
                                    شكرا لك على المشاركة
                                </h2>
                                <div className="p-5 border-4 border-double border-blue-900 rounded-[2.5rem] text-blue-900 font-black text-sm inline-block tracking-tight">جامعة تكريت - قسم الهندسة المدنية</div>
                                <div className="mt-10">
                                    <button onClick={() => setStep('register')} className="text-xs text-slate-400 font-bold hover:text-blue-900 transition-colors border-b border-transparent hover:border-blue-900 pb-1">هل تريد مراجعة حلك؟ العودة لتعديل البيانات</button>
                                </div>
                            </div>
                        )}
                    </div>
                    <div className="mt-8 text-center text-slate-400 text-[8px] font-bold uppercase tracking-widest italic select-none">Numerical Analysis HW3 Portal - Tikrit 2026</div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
