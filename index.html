<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واجب التحليلات العددية - جامعة تكريت</title>
    
    <!-- تحميل المكتبات الأساسية - تم استخدام روابط موثوقة -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
        body { 
            font-family: 'Tajawal', sans-serif; 
            margin: 0;
            background-color: #f3f4f6;
        }
        .ltr { direction: ltr; text-align: left; }
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #f3f3f3;
            border-top: 4px solid #2563eb; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- شاشة التحميل تظهر حتى يعمل React -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: #4b5563; font-weight: bold;">جاري تحميل الواجب...</p>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // مكوّن الأيقونات المعدل لتجنب الأخطاء
        const LucideIcon = ({ name, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        // الدوال الحسابية
        const f1 = (x) => Math.sqrt(x + 1);
        const f3 = (x) => Math.sqrt(1 + x);

        const trapezoidal = (a, b, n) => {
            const h = (b - a) / n;
            let sum = f1(a) + f1(b);
            for (let i = 1; i < n; i++) sum += 2 * f1(a + i * h);
            return (h / 2) * sum;
        };

        const simpson = (a, b, n) => {
            const h = (b - a) / n;
            let sum = f1(a) + f1(b);
            for (let i = 1; i < n; i++) sum += (i % 2 === 0 ? 2 : 4) * f1(a + i * h);
            return (h / 3) * sum;
        };

        const simpsonTable = (h, yValues) => {
            let sum = yValues[0] + yValues[yValues.length - 1];
            for (let i = 1; i < yValues.length - 1; i++) sum += (i % 2 === 0 ? 2 : 4) * yValues[i];
            return (h / 3) * sum;
        };

        const gauss3 = (a, b) => {
            const nodes = [-0.774596, 0, 0.774596];
            const weights = [0.555555, 0.888888, 0.555555];
            let sum = 0;
            const trans = (t) => ((b - a) / 2) * t + (b + a) / 2;
            for (let i = 0; i < 3; i++) sum += weights[i] * f1(trans(nodes[i]));
            return ((b - a) / 2) * sum;
        };

        const gauss4 = (a, b) => {
            const nodes = [-0.861136, -0.339981, 0.339981, 0.861136];
            const weights = [0.347855, 0.652145, 0.652145, 0.347855];
            let sum = 0;
            const trans = (t) => ((b - a) / 2) * t + (b + a) / 2;
            for (let i = 0; i < 4; i++) sum += weights[i] * f3(trans(nodes[i]));
            return ((b - a) / 2) * sum;
        };

        function App() {
            const [step, setStep] = useState(0);
            const [studentInfo, setStudentInfo] = useState({ name: '', studyType: '' });
            const [answers, setAnswers] = useState({ q1a: '', q1b: '', q1c: '', q2: '', q3: '' });
            const [pdfFile, setPdfFile] = useState(null);
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [loading, setLoading] = useState(false);
            const [assignmentData, setAssignmentData] = useState(null);

            // إخفاء شاشة التحميل عند البدء
            useEffect(() => {
                const loader = document.getElementById('loading-screen');
                if (loader) loader.style.display = 'none';

                const saved = localStorage.getItem('hw3_v2_data');
                if (saved) {
                    setAssignmentData(JSON.parse(saved));
                } else {
                    const a1 = Math.floor(Math.random() * 4) + 2;
                    const b1 = a1 + 4;
                    const a3 = Math.floor(Math.random() * 3) + 2;
                    const b3 = a3 + 6;
                    const x2 = Array.from({length: 7}, (_, i) => 3 + (i * 3));
                    const y2 = Array.from({length: 7}, () => (Math.random() * 15 + 2).toFixed(1)).map(Number);
                    const data = { a1, b1, a3, b3, x2, y2, h2: 3 };
                    localStorage.setItem('hw3_v2_data', JSON.stringify(data));
                    setAssignmentData(data);
                }
            }, []);

            const grades = useMemo(() => {
                if (!assignmentData) return {};
                const c1a = trapezoidal(assignmentData.a1, assignmentData.b1, 4);
                const c1b = simpson(assignmentData.a1, assignmentData.b1, 4);
                const c1c = gauss3(assignmentData.a1, assignmentData.b1);
                const c2 = simpsonTable(assignmentData.h2, assignmentData.y2);
                const c3 = gauss4(assignmentData.a3, assignmentData.b3);

                const chk = (s, c, m) => {
                    const v = parseFloat(s); if (isNaN(v)) return 0.5;
                    return Math.abs(v - c) < 0.05 ? m : (Math.abs(Math.abs(v) - Math.abs(c)) < 0.05 ? m - 0.5 : 0.5);
                };

                const g1a = chk(answers.q1a, c1a, 1.5);
                const g1b = chk(answers.q1b, c1b, 1.5);
                const g1c = chk(answers.q1c, c1c, 1.5);
                const g2 = chk(answers.q2, c2, 2.5);
                const g3 = chk(answers.q3, c3, 3);
                return { g1a, g1b, g1c, g2, g3, total: (g1a + g1b + g1c + g2 + g3).toFixed(2) };
            }, [answers, assignmentData]);

            const handleSubmit = async () => {
                setLoading(true);
                const reader = new FileReader();
                reader.readAsDataURL(pdfFile);
                reader.onload = async () => {
                    const base64 = reader.result.split(',')[1];
                    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzYfd1GjJU2431aFoE4-1R7KW1aV0B8urtocmTs774j8uCINExl5iK65k_tjYa14Oc8Kg/exec"; 
                    const payload = { ...studentInfo, ...answers, ...grades, pdfData: base64, pdfName: pdfFile.name, date: new Date().toLocaleString('ar-EG') };
                    try {
                        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                        setIsSubmitted(true);
                    } catch (e) { setIsSubmitted(true); }
                    setLoading(false);
                };
            };

            if (isSubmitted) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6">
                        <div className="bg-white p-10 rounded-3xl shadow-2xl max-w-md w-full text-center border-t-8 border-green-500">
                            <LucideIcon name="check-circle" className="text-green-500 w-20 h-20 mx-auto mb-4" />
                            <h1 className="text-2xl font-bold mb-2">تم التسليم بنجاح!</h1>
                            <p className="text-gray-600 mb-6">لقد قمت بتسليم بنجاح ستظهر اجاباتك عند الاستاذ</p>
                            <button onClick={() => setIsSubmitted(false)} className="text-blue-600 font-bold hover:underline">تعديل الإجابة النهائية</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col items-center py-10 px-4">
                    <div className="w-full max-w-2xl bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
                        {/* Header */}
                        <div className="bg-blue-600 p-6 text-white text-center">
                            <h1 className="text-xl font-bold">جامعة تكريت - كلية الهندسة</h1>
                            <p className="text-sm opacity-80">التحليلات العددية | الواجب البيتي رقم (3)</p>
                        </div>

                        {/* Progress */}
                        <div className="w-full bg-gray-100 h-1.5 flex">
                            {[...Array(7)].map((_, i) => (
                                <div key={i} className={`flex-1 transition-all ${i <= step ? 'bg-blue-500' : ''}`} />
                            ))}
                        </div>

                        <div className="p-8">
                            {step === 0 && (
                                <div className="space-y-6">
                                    <h2 className="text-xl font-bold text-center text-blue-900 underline decoration-blue-200 underline-offset-8">بيانات الطالب</h2>
                                    <input type="text" placeholder="الاسم الثلاثي بالعربي" className="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500" value={studentInfo.name} onChange={e => setStudentInfo({...studentInfo, name: e.target.value})} />
                                    <select className="w-full p-4 border rounded-2xl outline-none" value={studentInfo.studyType} onChange={e => setStudentInfo({...studentInfo, studyType: e.target.value})}>
                                        <option value="">نوع الدراسة</option>
                                        <option>صباحي A</option><option>صباحي B</option><option>صباحي C</option><option>فصلي</option><option>مسائي</option>
                                    </select>
                                    <div className="bg-amber-50 p-4 rounded-2xl border-r-4 border-amber-400 text-sm text-amber-800">قم بكتابة اسمك على جميع صفحات الحل اليدوي قبل ارساله</div>
                                </div>
                            )}

                            {assignmentData && step >= 1 && step <= 5 && (
                                <div className="space-y-6">
                                    <h3 className="font-bold text-blue-800 text-lg">السؤال {step <= 3 ? '1' : step === 4 ? '2' : '3'}</h3>
                                    <div className="bg-slate-50 p-6 rounded-2xl border text-center font-serif text-lg">
                                        {step === 1 && `Integrate sqrt(x+1) from ${assignmentData.a1} to ${assignmentData.b1} (Trapezoidal n=4)`}
                                        {step === 2 && `Integrate sqrt(x+1) from ${assignmentData.a1} to ${assignmentData.b1} (Simpson n=4)`}
                                        {step === 3 && `Integrate sqrt(x+1) from ${assignmentData.a1} to ${assignmentData.b1} (Gauss n=3)`}
                                        {step === 4 && (
                                            <div className="overflow-x-auto text-xs font-sans">
                                                <table className="w-full border">
                                                    <tr className="bg-white border"><td>X</td>{assignmentData.x2.map(v => <td key={v} className="border p-1">{v}</td>)}</tr>
                                                    <tr className="bg-white border"><td>f(x)</td>{assignmentData.y2.map((v, i) => <td key={i} className="border p-1">{v}</td>)}</tr>
                                                </table>
                                                <p className="mt-2">احسب المساحة (Simpson)</p>
                                            </div>
                                        )}
                                        {step === 5 && `Integrate sqrt(1+x) from ${assignmentData.a3} to ${assignmentData.b3} (Gauss n=4)`}
                                    </div>
                                    <input type="number" step="any" placeholder="النتيجة النهائية" className="w-full p-4 border rounded-2xl ltr font-mono text-xl" 
                                        value={step === 1 ? answers.q1a : step === 2 ? answers.q1b : step === 3 ? answers.q1c : step === 4 ? answers.q2 : answers.q3}
                                        onChange={e => setAnswers({...answers, [step === 1 ? 'q1a' : step === 2 ? 'q1b' : step === 3 ? 'q1c' : step === 4 ? 'q2' : 'q3']: e.target.value})} />
                                </div>
                            )}

                            {step === 6 && (
                                <div className="space-y-6 text-center">
                                    <h3 className="font-bold text-lg text-gray-800">إرفاق الحل اليدوي (PDF)</h3>
                                    <div className={`border-4 border-dashed p-10 rounded-3xl transition-all relative ${pdfFile ? 'border-green-400 bg-green-50' : 'border-blue-200 bg-blue-50'}`}>
                                        <input type="file" accept=".pdf" className="absolute inset-0 opacity-0 cursor-pointer" onChange={e => setPdfFile(e.target.files[0])} />
                                        {pdfFile ? <><LucideIcon name="file-check" className="w-12 h-12 text-green-500 mx-auto" /><p className="font-bold mt-2">{pdfFile.name}</p></> : <p className="text-blue-500 font-bold">اضغط لرفع ملف PDF للحلول</p>}
                                    </div>
                                    <p className="text-[10px] text-gray-400">ارفق ملف واحد فقط بصيغة pdf لجميع الحلول على ان لا يتجاوز حجم الملف ٨ ميكابايت</p>
                                </div>
                            )}
                        </div>

                        {/* Footer Buttons */}
                        <div className="p-6 bg-gray-50 border-t flex justify-between gap-4">
                            {step > 0 && <button onClick={() => setStep(step - 1)} className="px-6 py-3 border bg-white rounded-xl font-bold text-gray-600 flex items-center gap-2"><LucideIcon name="chevron-right" className="rotate-180" /> السابق</button>}
                            <button 
                                disabled={loading || (step === 0 && !studentInfo.name) || (step === 6 && !pdfFile)}
                                onClick={step === 6 ? handleSubmit : () => setStep(step + 1)}
                                className={`flex-grow px-8 py-3 rounded-xl text-white font-bold transition-all shadow-lg flex items-center justify-center gap-2 ${step === 6 ? 'bg-green-600' : 'bg-blue-600'}`}
                            >
                                {loading ? 'جاري الإرسال...' : (step === 6 ? 'تسليم الواجب النهائي' : 'التالي')}
                                {step < 6 && <LucideIcon name="chevron-left" className="rotate-180" />}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
