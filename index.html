<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جامعة تكريت - واجب التحليلات العددية HW3</title>
    <!-- استيراد المكتبات -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- إعداد MathJax لرسم المعادلات -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; }
        .math-container { background: #fff; border-radius: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
        .no-select { user-select: none; }
        .error-shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ضعي رابط Web App URL الخاص بكِ هنا ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyd5QibOYr0-z1Dto0kquz8KuNIWRHkvBzaldKhVoO9dvsJVN0o2U8pCXahfDkyec4B/exec";

        function App() {
            const [step, setStep] = useState('register');
            const [studentInfo, setStudentInfo] = useState({ name: '', studyType: 'صباحي A' });
            const [ans, setAns] = useState({});
            const [pdfBase64, setPdfBase64] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState("");
            const [isReturning, setIsReturning] = useState(false);

            // استعادة البيانات من الذاكرة للسماح بتعديل الإجابة
            useEffect(() => {
                const saved = localStorage.getItem('tikrit_hw3_final_data');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    setStudentInfo(parsed.studentInfo);
                    setAns(parsed.ans);
                    setIsReturning(true);
                }
            }, []);

            // تحديث MathJax عند تغيير الصفحة
            useEffect(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise();
                }
            }, [step, studentInfo.name]);

            // توليد بيانات عشوائية ثابتة لكل طالب بناءً على الاسم (Seeded Randomness)
            const assignment = useMemo(() => {
                if (!studentInfo.name || studentInfo.name.trim().length < 5) return null;
                const name = studentInfo.name;
                const seed = name.split("").reduce((a, b) => a + b.charCodeAt(0), 0);
                
                const getRnd = (min, max, offset) => {
                    const r = (Math.abs(Math.sin(seed + offset)) * 10000) % 1;
                    return (min + r * (max - min));
                };

                // س1: حدود التكامل [a, b]
                const q1_a = Math.floor(getRnd(0, 3, 10));
                const q1_b = q1_a + Math.floor(getRnd(4, 7, 20));

                // س2: جدول Simpson
                const q2_h = Math.floor(getRnd(1, 3, 30)) + 1;
                const q2_x = [0, 1, 2, 3, 4, 5, 6, 7, 8].map(i => i * q2_h);
                const q2_y = q2_x.map((x, i) => parseFloat(getRnd(5, 25, i + 100).toFixed(2)));

                // س3: حدود التكامل Gauss n=4
                const q3_a = Math.floor(getRnd(1, 4, 40));
                const q3_b = q3_a + Math.floor(getRnd(5, 9, 50));

                return { q1: { a: q1_a, b: q1_b }, q2: { h: q2_h, x: q2_x, y: q2_y }, q3: { a: q3_a, b: q3_b } };
            }, [studentInfo.name]);

            // محرك حساب الحل النموذجي (إرساله للإكسل للتدقيق)
            const calculateModel = () => {
                const f = (x) => Math.sqrt(x + 1);
                
                // Q1: Trapezoidal & Simpson n=4, Gauss n=3
                const { a, b } = assignment.q1;
                const h1 = (b-a)/4, y1 = [0,1,2,3,4].map(i => f(a + i*h1));
                const trap = (h1/2) * (y1[0] + y1[4] + 2*(y1[1]+y1[2]+y1[3]));
                const simp = (h1/3) * (y1[0] + y1[4] + 4*(y1[1]+y1[3]) + 2*y1[2]);
                const t3 = [0, -0.77459, 0.77459], w3 = [0.88888, 0.55555, 0.55555];
                let g3 = 0; for(let i=0; i<3; i++) g3 += w3[i] * f(((b-a)/2)*t3[i] + ((b+a)/2)); g3 *= (b-a)/2;

                // Q2 Area
                const y2 = assignment.q2.y, h2 = assignment.q2.h;
                let area = y2[0] + y2[8]; for(let i=1; i<8; i++) area += (i % 2 === 1 ? 4 : 2) * y2[i]; area *= (h2 / 3);

                // Q3 Gauss n=4
                const a3 = assignment.q3.a, b3 = assignment.q3.b;
                const t4 = [0.33998, -0.33998, 0.86113, -0.86113], w4 = [0.65214, 0.65214, 0.34785, 0.34785];
                let g4 = 0; for(let i=0; i<4; i++) g4 += w4[i] * f(((b3-a3)/2)*t4[i] + ((b3+a3)/2)); g4 *= (b3-a3)/2;

                return {
                    q1: `Trap:${trap.toFixed(3)}, Simp:${simp.toFixed(3)}, Gauss:${g3.toFixed(3)}`,
                    q2: area.toFixed(3),
                    q3: g4.toFixed(3)
                };
            };

            const validateAndGo = (curr, nxt) => {
                let ok = false;
                if (curr === 'register') ok = studentInfo.name.trim().split(/\s+/).length >= 3;
                if (curr === 'q1') ok = ans.q1t && ans.q1s && ans.q1g;
                if (curr === 'q2') ok = ans.q2;
                if (curr === 'q3') ok = ans.q3;

                if (ok) { setStep(nxt); setError(""); }
                else { setError("يرجى ملء جميع الخانات (الاسم الثلاثي مطلوب)"); }
            };

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (file && file.size <= 8 * 1024 * 1024) {
                    const reader = new FileReader();
                    reader.onload = () => setPdfBase64(reader.result.split(',')[1]);
                    reader.readAsDataURL(file);
                }
            };

            const submitAssignment = async () => {
                if (!pdfBase64) return alert("يرجى رفع ملف الحل اليدوي PDF لإتمام التسليم");
                setLoading(true);
                const model = calculateModel();
                const payload = {
                    name: studentInfo.name,
                    studyType: studentInfo.studyType,
                    grade: "جاري التصحيح",
                    studentAnswers: ans,
                    modelAnswers: model,
                    pdfBase64: pdfBase64,
                    timestamp: new Date().toLocaleString('ar-IQ')
                };

                try {
                    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    localStorage.setItem('tikrit_hw3_final_data', JSON.stringify({ studentInfo, ans }));
                    setStep('success');
                } catch (e) { alert("حدث خطأ في الاتصال"); } finally { setLoading(false); }
            };

            return (
                <div className="min-h-screen py-10 px-4 flex flex-col items-center">
                    <div className="w-full max-w-2xl math-container overflow-hidden border-t-[14px] border-blue-900 transition-all no-select">
                        
                        {/* Header */}
                        <div className="p-6 bg-slate-50 border-b flex justify-between items-center">
                            <div className="text-right">
                                <h1 className="text-2xl font-black text-blue-900 leading-none tracking-tight">جامعة تكريت</h1>
                                <p className="text-[10px] font-bold text-slate-400 mt-1">ENGINEERING COLLEGE - CIVIL DEPT.</p>
                            </div>
                            <div className="text-blue-900 border-2 border-blue-900 px-4 py-1 rounded-2xl font-black text-xs">NUMERICAL HW3</div>
                        </div>

                        {step === 'register' && (
                            <div className="p-10 text-right">
                                {isReturning && <div className="bg-blue-50 text-blue-700 p-4 rounded-3xl mb-8 text-xs font-bold border border-blue-100">أهلاً بك مجدداً يا {studentInfo.name.split(" ")[0]}، يمكنك مراجعة وتعديل حلك.</div>}
                                <h2 className="text-xl font-black mb-8 border-r-8 border-blue-600 pr-3">بيانات الطالب</h2>
                                <input type="text" placeholder="الاسم الثلاثي باللغة العربية" className="w-full p-4 border-2 rounded-3xl mb-4 outline-none focus:border-blue-900 shadow-sm" onChange={e => setStudentInfo({...studentInfo, name: e.target.value})} value={studentInfo.name} />
                                <select className="w-full p-4 border-2 rounded-3xl mb-10 bg-white font-bold" onChange={e => setStudentInfo({...studentInfo, studyType: e.target.value})} value={studentInfo.studyType}>
                                    <option>صباحي A</option><option>صباحي B</option><option>صباحي C</option><option>فصلي</option><option>مسائي</option>
                                </select>
                                {error && <p className="text-xs text-red-500 font-bold mb-4 error-shake">{error}</p>}
                                <button onClick={() => validateAndGo('register', 'q1')} className="w-full bg-blue-900 text-white font-black py-4 rounded-3xl shadow-xl hover:bg-blue-800 transition-all text-lg">ابدأ حل الواجب</button>
                            </div>
                        )}

                        {step === 'q1' && (
                            <div className="p-8 text-right">
                                <button onClick={() => setStep('register')} className="text-blue-600 text-xs font-bold mb-4">← العودة لتعديل الاسم</button>
                                <div className="bg-blue-50 p-6 rounded-[2.5rem] border-r-8 border-blue-900 mb-8 shadow-inner text-center">
                                    <p className="text-right text-sm font-bold text-slate-700 mb-4">Q1: Evaluate the following integral:</p>
                                    <div className="text-2xl my-4 text-blue-900">
                                        {"\\[ \\int_{" + assignment.q1.a + "}^{" + assignment.q1.b + "} \\sqrt{x+1} \\, dx \\]"}
                                    </div>
                                    <p className="text-[10px] font-black text-slate-400 mt-2">using: a) Trapezoidal (n=4), b) Simpson's (n=4), c) Gauss (n=3)</p>
                                </div>
                                <div className="space-y-4">
                                    <input type="number" step="any" placeholder="الناتج (a) Trapezoidal" className="w-full p-4 border-2 rounded-2xl text-center font-mono" onChange={e => setAns({...ans, q1t: e.target.value})} value={ans.q1t || ''} />
                                    <input type="number" step="any" placeholder="الناتج (b) Simpson's" className="w-full p-4 border-2 rounded-2xl text-center font-mono" onChange={e => setAns({...ans, q1s: e.target.value})} value={ans.q1s || ''} />
                                    <input type="number" step="any" placeholder="الناتج (c) Gauss-Quadrature" className="w-full p-4 border-2 rounded-2xl text-center font-mono" onChange={e => setAns({...ans, q1g: e.target.value})} value={ans.q1g || ''} />
                                </div>
                                {error && <p className="text-xs text-red-500 font-bold mt-4 error-shake">{error}</p>}
                                <button onClick={() => validateAndGo('q1', 'q2')} className="w-full mt-10 bg-blue-900 text-white py-4 rounded-3xl font-black">السؤال التالي</button>
                            </div>
                        )}

                        {step === 'q2' && (
                            <div className="p-8 text-right">
                                <div className="bg-blue-50 p-6 rounded-[2rem] border-r-8 border-blue-900 mb-6">
                                    <p className="font-bold text-sm leading-relaxed">Q2: Find the area enclosed by the following points using Simpson's Rule:</p>
                                </div>
                                <div className="overflow-x-auto mb-6 rounded-2xl border shadow-inner">
                                    <table className="w-full text-center text-[10px] font-mono">
                                        <tr className="bg-blue-900 text-white font-bold"><td className="p-2 border-b border-blue-800">X</td>{assignment.q2.x.map((v, i) => <td key={i} className="border-b border-blue-800">{v}</td>)}</tr>
                                        <tr><td className="p-2 font-bold bg-slate-100">f(x)</td>{assignment.q2.y.map((v, i) => <td key={i}>{v}</td>)}</tr>
                                    </table>
                                </div>
                                <input type="number" step="any" placeholder="ادخل قيمة المساحة النهائية..." className="w-full p-4 border-2 rounded-2xl text-center font-mono" onChange={e => setAns({...ans, q2: e.target.value})} value={ans.q2 || ''} />
                                {error && <p className="text-xs text-red-500 font-bold mt-4 error-shake">{error}</p>}
                                <div className="flex gap-4 mt-8">
                                    <button onClick={() => setStep('q1')} className="flex-1 bg-slate-100 py-4 rounded-2xl font-black text-slate-400">السابق</button>
                                    <button onClick={() => validateAndGo('q2', 'q3')} className="flex-[2] bg-blue-900 text-white py-4 rounded-2xl font-black shadow-lg">السؤال الثالث</button>
                                </div>
                            </div>
                        )}

                        {step === 'q3' && (
                            <div className="p-8 text-right">
                                <div className="bg-blue-50 p-6 rounded-[2.5rem] border-r-8 border-blue-900 mb-8 shadow-inner text-center">
                                    <p className="text-right text-sm font-bold text-slate-700 mb-4">Q3: Evaluate the following integral:</p>
                                    <div className="text-2xl my-4 text-blue-900">
                                        {"\\[ \\int_{" + assignment.q3.a + "}^{" + assignment.q3.b + "} \\sqrt{1+x} \\, dx \\]"}
                                    </div>
                                    <p className="text-[10px] font-black text-slate-400 mt-2">using Gauss-Quadrature formula (n=4).</p>
                                </div>
                                <input type="number" step="any" placeholder="ادخل الناتج النهائي هنا..." className="w-full p-4 border-2 rounded-2xl text-center font-mono" onChange={e => setAns({...ans, q3: e.target.value})} value={ans.q3 || ''} />
                                {error && <p className="text-xs text-red-500 font-bold mt-4 error-shake">{error}</p>}
                                <div className="flex gap-4 mt-10">
                                    <button onClick={() => setStep('q2')} className="flex-1 bg-slate-100 py-4 rounded-2xl font-black text-slate-400">السابق</button>
                                    <button onClick={() => validateAndGo('q3', 'submit')} className="flex-[2] bg-blue-900 text-white py-4 rounded-2xl font-black shadow-lg">الانتقال للرفع</button>
                                </div>
                            </div>
                        )}

                        {step === 'submit' && (
                            <div className="p-10 text-center">
                                <h3 className="text-xl font-black mb-8 text-blue-900 italic underline underline-offset-8 decoration-blue-100">رفع الحل النهائي PDF</h3>
                                <div className="border-4 border-dashed p-14 rounded-[3.5rem] bg-slate-50 mb-10 border-blue-50 flex flex-col items-center group hover:border-blue-300 transition-colors">
                                    <input type="file" accept="application/pdf" id="pdf" className="hidden" onChange={handleFile} />
                                    <label htmlFor="pdf" className="cursor-pointer">
                                        <div className="text-7xl mb-4 group-hover:scale-110 transition-transform">📄</div>
                                        <p className="font-bold text-slate-600 mb-2">{pdfBase64 ? "✅ تم اختيار الملف بنجاح" : "اضغط لاختيار ملف PDF للحل اليدوي"}</p>
                                    </label>
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={() => setStep('q3')} className="flex-1 bg-slate-100 py-5 rounded-3xl font-black text-slate-400">رجوع</button>
                                    <button onClick={submitAssignment} disabled={loading || !pdfBase64} className="flex-[2] bg-green-600 text-white py-5 rounded-3xl font-black text-2xl shadow-xl disabled:opacity-30">
                                        {loading ? "جاري الإرسال..." : "تأكيد التسليم"}
                                    </button>
                                </div>
                                {!pdfBase64 && <p className="text-[10px] text-red-500 font-bold mt-6 tracking-tight">* يجب رفع ملف الحل بصيغة PDF لتفعيل زر التسليم</p>}
                            </div>
                        )}

                        {step === 'success' && (
                            <div className="p-20 text-center bg-white">
                                <div className="text-8xl mb-8">🎓</div>
                                <h2 className="text-4xl font-black mb-6 text-blue-900 tracking-tight">تم التسليم بنجاح!</h2>
                                <p className="text-slate-600 font-bold mb-12 leading-loose text-lg">يا <span className="text-blue-900 underline underline-offset-4 decoration-2">{studentInfo.name}</span>، تم تحديث إجاباتك في ملف الأستاذ بنجاح.</p>
                                <div className="p-5 border-4 border-double border-blue-900 rounded-[2.5rem] text-blue-900 font-black text-sm inline-block">جامعة تكريت - قسم الهندسة المدنية</div>
                                <button onClick={() => setStep('register')} className="block mx-auto mt-8 text-xs text-slate-300 font-bold hover:text-blue-900 border-b border-transparent hover:border-blue-900 pb-1">العودة لتعديل البيانات مرة أخرى</button>
                            </div>
                        )}
                    </div>
                    <div className="mt-8 text-center text-slate-300 text-[8px] font-bold uppercase tracking-widest italic select-none">NUMERICAL ANALYSIS - TIKRIT UNIVERSITY 2026</div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
