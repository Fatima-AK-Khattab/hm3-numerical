<!DOCTYPE html>
<html lang="ar" dir="rtl" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Numerical Analysis Homework</title>
    
    <!-- تحميل المكتبات بروابط مستقرة جداً -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: #f8fafc;
            user-select: none;
        }
        .math-font { font-family: 'Times New Roman', Times, serif; font-style: italic; }
        .ltr { direction: ltr; text-align: left; }
        .no-translate { translate: no; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="notranslate" translate="no">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // مكوّن أيقونات ثابت
        const LucideIcon = ({ name, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        // محرك الحسابات (للتصحيح التلقائي)
        const solveMath = {
            f1: (x) => Math.sqrt(x + 1),
            f3: (x) => Math.sqrt(1 + x),
            trap: (a, b, n) => {
                const h = (b - a) / n;
                let s = solveMath.f1(a) + solveMath.f1(b);
                for (let i = 1; i < n; i++) s += 2 * solveMath.f1(a + i * h);
                return (h / 2) * s;
            },
            simp: (a, b, n) => {
                const h = (b - a) / n;
                let s = solveMath.f1(a) + solveMath.f1(b);
                for (let i = 1; i < n; i++) s += (i % 2 === 0 ? 2 : 4) * solveMath.f1(a + i * h);
                return (h / 3) * s;
            },
            gauss3: (a, b) => {
                const nodes = [-0.7745966692, 0, 0.7745966692], weights = [0.5555555556, 0.8888888889, 0.5555555556];
                let s = 0; const tr = (t) => ((b - a) / 2) * t + (b + a) / 2;
                for (let i = 0; i < 3; i++) s += weights[i] * solveMath.f1(tr(nodes[i]));
                return ((b - a) / 2) * s;
            },
            simpTable: (h, y) => {
                let s = y[0] + y[y.length - 1];
                for (let i = 1; i < y.length - 1; i++) s += (i % 2 === 0 ? 2 : 4) * y[i];
                return (h / 3) * s;
            },
            gauss4: (a, b) => {
                const nodes = [-0.861136, -0.339981, 0.339981, 0.861136], weights = [0.347855, 0.652145, 0.652145, 0.347855];
                let s = 0; const tr = (t) => ((b - a) / 2) * t + (b + a) / 2;
                for (let i = 0; i < 4; i++) s += weights[i] * solveMath.f3(tr(nodes[i]));
                return ((b - a) / 2) * s;
            }
        };

        function App() {
            const [step, setStep] = useState(0);
            const [student, setStudent] = useState({ name: '', type: '' });
            const [ans, setAns] = useState({ q1a: '', q1b: '', q1c: '', q2: '', q3: '' });
            const [pdf, setPdf] = useState(null);
            const [isDone, setIsDone] = useState(false);
            const [loading, setLoading] = useState(false);
            const [qData, setQData] = useState(null);

            // توليد بيانات الأسئلة مرة واحدة فقط لكل طالب
            useEffect(() => {
                const saved = localStorage.getItem('NA_HW3_DATA_STABLE');
                if (saved) {
                    setQData(JSON.parse(saved));
                } else {
                    const a1 = Math.floor(Math.random() * 3) + 2; 
                    const a3 = Math.floor(Math.random() * 3) + 2;
                    const xStart = Math.floor(Math.random() * 5);
                    const yVal = Array.from({length: 7}, () => parseFloat((Math.random() * 15 + 2).toFixed(1)));
                    const data = { a1, b1: a1+4, a3, b3: a3+6, x2: Array.from({length: 7}, (_, i) => xStart + (i*3)), y2: yVal, h2: 3 };
                    localStorage.setItem('NA_HW3_DATA_STABLE', JSON.stringify(data));
                    setQData(data);
                }
            }, []);

            // التحقق من صحة الخطوة الحالية
            const isValid = () => {
                if (step === 0) return student.name.trim().length > 7 && student.type !== '';
                if (step === 1) return ans.q1a !== '';
                if (step === 2) return ans.q1b !== '';
                if (step === 3) return ans.q1c !== '';
                if (step === 4) return ans.q2 !== '';
                if (step === 5) return ans.q3 !== '';
                if (step === 6) return pdf !== null;
                return true;
            };

            const getGrades = () => {
                const c = {
                    q1a: solveMath.trap(qData.a1, qData.b1, 4),
                    q1b: solveMath.simp(qData.a1, qData.b1, 4),
                    q1c: solveMath.gauss3(qData.a1, qData.b1),
                    q2: solveMath.simpTable(qData.h2, qData.y2),
                    q3: solveMath.gauss4(qData.a3, qData.b3)
                };
                const calc = (s, cor, max) => {
                    const v = parseFloat(s); if (isNaN(v)) return 0.5;
                    if (Math.abs(v - cor) < 0.05) return max;
                    if (Math.abs(Math.abs(v) - Math.abs(cor)) < 0.05) return max - 0.5;
                    return 0.5;
                };
                const g1a = calc(ans.q1a, c.q1a, 1.5);
                const g1b = calc(ans.q1b, c.q1b, 1.5);
                const g1c = calc(ans.q1c, c.q1c, 1.5);
                const g2 = calc(ans.q2, c.q2, 2.5);
                const g3 = calc(ans.q3, c.q3, 3.0);
                return { g1a, g1b, g1c, g2, g3, total: (g1a+g1b+g1c+g2+g3).toFixed(2) };
            };

            const submitHW = async () => {
                setLoading(true);
                const reader = new FileReader();
                reader.readAsDataURL(pdf);
                reader.onload = async () => {
                    const base64 = reader.result.split(',')[1];
                    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzYfd1GjJU2431aFoE4-1R7KW1aV0B8urtocmTs774j8uCINExl5iK65k_tjYa14Oc8Kg/exec"; 
                    const payload = { ...student, ...ans, ...getGrades(), pdfData: base64, date: new Date().toLocaleString('ar-EG') };
                    try {
                        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                        setIsDone(true);
                    } catch (e) { setIsDone(true); }
                    setLoading(false);
                };
            };

            if (isDone) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50">
                        <div className="bg-white p-10 rounded-3xl shadow-2xl max-w-md w-full text-center border-t-8 border-green-500 animate-pulse">
                            <LucideIcon name="check-circle" className="text-green-500 w-20 h-20 mx-auto mb-4" />
                            <h1 className="text-2xl font-black text-slate-800">لقد قمت بتسليم بنجاح</h1>
                            <p className="text-slate-600 mt-2">ستظهر اجاباتك عند الاستاذ</p>
                            <button onClick={() => setIsDone(false)} className="mt-6 text-blue-600 font-bold hover:underline">العودة لتعديل الاجابة النهائية</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col items-center py-6 px-4 bg-slate-100">
                    {/* ترويسة ثابتة - لا تترجم */}
                    <div className="w-full max-w-2xl bg-white p-6 rounded-t-3xl shadow-sm border-b-2 border-slate-100 text-center notranslate">
                        <h2 className="font-black text-slate-800 text-lg">Civil Engineering Department - Tikrit University</h2>
                        <p className="text-slate-500 text-sm font-bold">Numerical Analysis / Second Semester / 2025-2026</p>
                        <div className="mt-2 inline-block px-4 py-1 bg-blue-600 text-white text-xs rounded-full font-bold uppercase">Home Work No. (3)</div>
                    </div>

                    <div className="w-full max-w-2xl bg-white rounded-b-3xl shadow-xl overflow-hidden flex flex-col min-h-[550px]">
                        {/* Progress Bar */}
                        <div className="w-full bg-slate-100 h-1.5 flex">
                            {[...Array(7)].map((_, i) => (
                                <div key={i} className={`flex-1 transition-all duration-700 ${i <= step ? 'bg-blue-600' : ''}`} />
                            ))}
                        </div>

                        <div className="p-8 flex-grow" key={`step-${step}`}>
                            {step === 0 && (
                                <div className="space-y-6">
                                    <h3 className="text-xl font-black text-center text-slate-800 mb-8 underline underline-offset-8 decoration-blue-300">معلومات الطالب</h3>
                                    <div className="space-y-4">
                                        <div className="space-y-1">
                                            <span className="text-xs font-bold text-slate-500 mr-2">الاسم الثلاثي باللغة العربية</span>
                                            <input type="text" placeholder="اكتب اسمك الكامل هنا..." className="w-full p-4 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition-all font-bold" value={student.name} onChange={e => setStudent({...student, name: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <span className="text-xs font-bold text-slate-500 mr-2">نوع الدراسة</span>
                                            <select className="w-full p-4 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition-all font-bold appearance-none bg-white" value={student.type} onChange={e => setStudent({...student, type: e.target.value})}>
                                                <option value="">-- اختر من القائمة --</option>
                                                <option>صباحي A</option><option>صباحي B</option><option>صباحي C</option><option>فصلي</option><option>مسائي</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div className="bg-amber-50 p-4 rounded-2xl border-r-4 border-amber-400 text-xs text-amber-900 font-bold leading-relaxed">
                                        قم بكتابة اسمك على جميع صفحات الحل اليدوي قبل ارساله.
                                    </div>
                                </div>
                            )}

                            {qData && step >= 1 && step <= 3 && (
                                <div className="space-y-6">
                                    <h3 className="text-lg font-black text-slate-800 border-b pb-2">Q1: Evaluate</h3>
                                    <div className="bg-slate-50 p-6 rounded-3xl border-2 border-dashed border-slate-200 text-center space-y-4">
                                        <div className="math-font text-2xl ltr">
                                            ∫<sub className="text-xs">{qData.a1}</sub><sup>{qData.b1}</sup> √(x+1) dx
                                        </div>
                                        <p className="text-sm font-bold text-slate-500">
                                            using: <span className="text-blue-700">{step === 1 ? 'a.) Trapezoidal Method (n=4)' : step === 2 ? "b.) Simpson's Rule (n=4)" : 'c.) Gauss-Quadrature (n=3)'}</span>
                                        </p>
                                    </div>
                                    <div className="space-y-2">
                                        <span className="text-xs font-bold text-slate-500 mr-2">النتيجة النهائية المحسوبة:</span>
                                        <input type="number" step="any" placeholder="0.0000" className="w-full p-4 border-2 border-slate-100 rounded-2xl ltr font-mono text-xl focus:border-blue-500 outline-none transition-all shadow-inner" 
                                            value={step === 1 ? ans.q1a : step === 2 ? ans.q1b : ans.q1c}
                                            onChange={e => setAns({...ans, [step === 1 ? 'q1a' : step === 2 ? 'q1b' : 'q1c']: e.target.value})} />
                                    </div>
                                </div>
                            )}

                            {qData && step === 4 && (
                                <div className="space-y-6">
                                    <h3 className="text-lg font-black text-slate-800 border-b pb-2">Q2: Find the area enclosed</h3>
                                    <p className="text-sm font-bold text-slate-600">Find the area enclosed by the following points using: <span className="text-blue-600 underline">Simpson's Rule</span></p>
                                    <div className="overflow-x-auto rounded-xl border border-slate-200 shadow-sm">
                                        <table className="w-full text-center text-xs ltr">
                                            <tr className="bg-slate-50 font-black"><td className="border p-2">X</td>{qData.x2.map(v => <td key={v} className="border p-2">{v}</td>)}</tr>
                                            <tr><td className="border p-2 font-black italic italic">f(x)</td>{qData.y2.map((v, i) => <td key={i} className="border p-2">{v}</td>)}</tr>
                                        </table>
                                    </div>
                                    <div className="space-y-2">
                                        <span className="text-xs font-bold text-slate-500 mr-2">المساحة النهائية:</span>
                                        <input type="number" step="any" placeholder="0.00" className="w-full p-4 border-2 border-slate-100 rounded-2xl ltr font-mono text-xl focus:border-blue-500 outline-none" 
                                            value={ans.q2} onChange={e => setAns({...ans, q2: e.target.value})} />
                                    </div>
                                </div>
                            )}

                            {qData && step === 5 && (
                                <div className="space-y-6">
                                    <h3 className="text-lg font-black text-slate-800 border-b pb-2">Q3: Evaluate</h3>
                                    <div className="bg-slate-50 p-6 rounded-3xl border-2 border-dashed border-slate-200 text-center space-y-4">
                                        <div className="math-font text-2xl ltr">
                                            ∫<sub className="text-xs">{qData.a3}</sub><sup>{qData.b3}</sup> √(1+x) dx
                                        </div>
                                        <p className="text-sm font-bold text-slate-500">using <span className="text-blue-700">Gauss-Quadrature formula (n=4)</span></p>
                                    </div>
                                    <div className="space-y-2">
                                        <span className="text-xs font-bold text-slate-500 mr-2">النتيجة النهائية:</span>
                                        <input type="number" step="any" placeholder="0.00" className="w-full p-4 border-2 border-slate-100 rounded-2xl ltr font-mono text-xl focus:border-blue-500 outline-none" 
                                            value={ans.q3} onChange={e => setAns({...ans, q3: e.target.value})} />
                                    </div>
                                </div>
                            )}

                            {step === 6 && (
                                <div className="space-y-8 text-center">
                                    <h3 className="text-xl font-black text-slate-800">إرفاق ملف الحل اليدوي</h3>
                                    <div className={`relative border-4 border-dashed p-10 rounded-[2.5rem] transition-all cursor-pointer ${pdf ? 'border-green-400 bg-green-50' : 'border-slate-200 bg-slate-50 hover:bg-blue-50 hover:border-blue-300'}`}>
                                        <input type="file" accept=".pdf" className="absolute inset-0 opacity-0 cursor-pointer z-20" onChange={e => setPdf(e.target.files[0])} />
                                        {pdf ? (
                                            <div className="flex flex-col items-center gap-2">
                                                <LucideIcon name="file-check" className="w-16 h-16 text-green-500" />
                                                <span className="font-bold text-green-900">{pdf.name}</span>
                                            </div>
                                        ) : (
                                            <div className="flex flex-col items-center gap-2 text-slate-400">
                                                <LucideIcon name="upload-cloud" className="w-16 h-16" />
                                                <span className="font-bold">اضغط هنا لرفع ملف PDF واحد لجميع الحلول</span>
                                            </div>
                                        )}
                                    </div>
                                    <div className="bg-blue-50 p-4 rounded-2xl text-[10px] text-blue-800 font-bold text-center">ارفق ملف واحد فقط بصيغة pdf لجميع الحلول على ان لا يتجاوز حجم الملف ٨ ميكابايت</div>
                                </div>
                            )}
                        </div>

                        {/* Navigation Footer */}
                        <div className="p-8 bg-slate-50 border-t flex justify-between gap-4">
                            {step > 0 && (
                                <button onClick={() => setStep(step - 1)} className="px-6 py-4 border-2 border-slate-200 bg-white rounded-2xl font-black text-slate-500 hover:bg-slate-100 transition-all active:scale-95">السابق</button>
                            )}
                            <button 
                                disabled={loading || !isValid()}
                                onClick={step === 6 ? submitHW : () => setStep(step + 1)}
                                className={`flex-grow px-8 py-4 rounded-2xl text-white font-black shadow-lg transition-all active:scale-95 flex items-center justify-center gap-3 disabled:opacity-40 disabled:cursor-not-allowed ${step === 6 ? 'bg-green-600 hover:bg-green-700' : 'bg-blue-700 hover:bg-blue-800'}`}
                            >
                                {loading ? 'جاري الإرسال...' : (step === 6 ? 'إرسال الواجب النهائي' : 'الانتقال للسؤال التالي')}
                                {step < 6 && <LucideIcon name="chevron-left" className="w-5 h-5 rotate-180" />}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
